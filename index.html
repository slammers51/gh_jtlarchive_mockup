<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTL-Archive Onboarding Mockup</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel standalone (zum Kompilieren von JSX im Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        // React Hooks initialisieren
        const { useState, useEffect } = React;
        
        // --- NATIVE LUCIDE ICONS (Bulletproof Standalone SVG Components) ---
        const SVGIcon = ({ children, className = '' }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {children}
          </svg>
        );

        const CheckCircle = (p) => <SVGIcon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></SVGIcon>;
        const ShoppingCart = (p) => <SVGIcon {...p}><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></SVGIcon>;
        const Globe = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></SVGIcon>;
        const Mail = (p) => <SVGIcon {...p}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></SVGIcon>;
        const ExternalLink = (p) => <SVGIcon {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></SVGIcon>;
        const MoreHorizontal = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></SVGIcon>;
        const Archive = (p) => <SVGIcon {...p}><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></SVGIcon>;
        const ChevronLeft = (p) => <SVGIcon {...p}><polyline points="15 18 9 12 15 6"/></SVGIcon>;
        const ChevronRight = (p) => <SVGIcon {...p}><polyline points="9 18 15 12 9 6"/></SVGIcon>;
        const Search = (p) => <SVGIcon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></SVGIcon>;
        const Check = (p) => <SVGIcon {...p}><polyline points="20 6 9 17 4 12"/></SVGIcon>;
        const AlertCircle = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></SVGIcon>;
        const Shield = (p) => <SVGIcon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></SVGIcon>;
        const LogOut = (p) => <SVGIcon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></SVGIcon>;
        const Users = (p) => <SVGIcon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></SVGIcon>;
        const UserPlus = (p) => <SVGIcon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></SVGIcon>;
        const Trash2 = (p) => <SVGIcon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></SVGIcon>;
        const Info = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></SVGIcon>;
        const FileText = (p) => <SVGIcon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></SVGIcon>;
        const Filter = (p) => <SVGIcon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></SVGIcon>;
        const RefreshCw = (p) => <SVGIcon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></SVGIcon>;
        const ChevronDown = (p) => <SVGIcon {...p}><polyline points="6 9 12 15 18 9"/></SVGIcon>;
        const Heart = (p) => <SVGIcon {...p}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></SVGIcon>;
        const Paperclip = (p) => <SVGIcon {...p}><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></SVGIcon>;
        const Grid = (p) => <SVGIcon {...p}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></SVGIcon>;
        const List = (p) => <SVGIcon {...p}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></SVGIcon>;
        const Folder = (p) => <SVGIcon {...p}><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-1.22-1.8A2 2 0 0 0 7.53 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></SVGIcon>;
        const X = (p) => <SVGIcon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></SVGIcon>;
        const MessageSquare = (p) => <SVGIcon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></SVGIcon>;
        const MoreVertical = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></SVGIcon>;
        const LayoutGrid = Grid;
        
        const Pause = (p) => <SVGIcon {...p}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></SVGIcon>;
        const Play = (p) => <SVGIcon {...p}><polygon points="5 3 19 12 5 21 5 3"/></SVGIcon>;
        const Loader = (p) => <SVGIcon {...p}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="4.93" x2="19.07" y2="7.76"/></SVGIcon>;
        const CreditCard = (p) => <SVGIcon {...p}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></SVGIcon>;

        // Tooltip Component for PM Notes
        const PmTooltip = ({ children, text, position = 'bottom' }) => (
          <div className="relative group inline-flex items-center cursor-help">
            {/* The Highlight border just to show there's a note */}
            <div className="relative border-b-2 border-dashed border-indigo-400 group-hover:border-indigo-600 transition-colors">
                {children}
            </div>
            
            <div className={`absolute z-[100] invisible group-hover:visible opacity-0 group-hover:opacity-100 transition-all bg-indigo-900 text-white text-xs p-4 rounded-lg shadow-xl w-80 pointer-events-none border border-indigo-700 ${
              position === 'top' ? 'bottom-full mb-3 left-1/2 -translate-x-1/2' : 
              position === 'left' ? 'right-full mr-3 top-1/2 -translate-y-1/2' :
              position === 'right' ? 'left-full ml-3 top-1/2 -translate-y-1/2' :
              'top-full mt-3 left-1/2 -translate-x-1/2'
            }`}>
              <div className="font-bold text-indigo-300 mb-2 flex items-center gap-1.5 uppercase tracking-widest text-[10px]">
                <Info className="w-3.5 h-3.5"/> Architektur-Notiz
              </div>
              <div className="leading-relaxed">{text}</div>
              
              {/* Arrow */}
              <div className={`absolute w-3 h-3 bg-indigo-900 border-indigo-700 transform rotate-45 ${
                position === 'top' ? 'bottom-[-7px] left-1/2 -translate-x-1/2 border-r border-b' : 
                position === 'left' ? 'right-[-7px] top-1/2 -translate-y-1/2 border-r border-t' :
                position === 'right' ? 'left-[-7px] top-1/2 -translate-y-1/2 border-l border-b' :
                'top-[-7px] left-1/2 -translate-x-1/2 border-l border-t'
              }`}></div>
            </div>
          </div>
        );

        // Ausgelagerte Komponente für statisch sichtbare Architektur-Callouts unterhalb der App
        const ArchCallout = ({ title, children }) => (
          <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-5 flex gap-4 items-start w-full shadow-sm">
            <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center shrink-0">
              <Info className="w-5 h-5 text-indigo-600" />
            </div>
            <div>
              <h4 className="font-bold text-indigo-900 text-sm mb-2">{title}</h4>
              <div className="text-sm text-indigo-800 leading-relaxed space-y-3">
                {children}
              </div>
            </div>
          </div>
        );

        function App() {
          // Views: 'overview_initial', 'wizard', 'overview_active', 'greyhound_app', 'license_management'
          const [view, setView] = useState('overview_initial');
          const [wizardStep, setWizardStep] = useState(1); // 1: Verbindung, 2: Tarif, 3: Einrichtung
          
          // Dev-Toggles
          const [customerEdition, setCustomerEdition] = useState('enterprise'); // 'enterprise' or 'start'
          const [isWawiConnected, setIsWawiConnected] = useState(true); // Step 1: Wawi connection
          const [hasLicense, setHasLicense] = useState(true); // Step 5: License check
          const [showLicenseError, setShowLicenseError] = useState(false);

          // Consent Form State
          const [consentBeta, setConsentBeta] = useState(false);
          const [consentData, setConsentData] = useState(false);
          const [consentBuy, setConsentBuy] = useState(false);

          // Provisioning State
          const [provisioningStep, setProvisioningStep] = useState(0);

          // Reset states when starting wizard
          const handleStartWizard = () => {
            setView('wizard');
            setWizardStep(1);
            setConsentBeta(false);
            setConsentData(false);
            setConsentBuy(false);
            setProvisioningStep(0);
          };

          // Simulate Provisioning Process when reaching Step 3
          useEffect(() => {
            if (view === 'wizard' && wizardStep === 3) {
              setProvisioningStep(0);
              const timers = [
                setTimeout(() => setProvisioningStep(1), 2000), // ERP verbinden
                setTimeout(() => setProvisioningStep(2), 4000), // Kontakte sync
                setTimeout(() => setProvisioningStep(3), 6000), // Fertig
              ];
              return () => timers.forEach(clearTimeout);
            }
          }, [view, wizardStep]);

          const canProceedConsent = () => {
            if (customerEdition === 'enterprise') {
              return consentBeta && consentData;
            } else {
              return consentBeta && consentData && consentBuy;
            }
          };

          const handleStartApp = () => {
            // Schritt 5: Lizenzprüfung findet beim Starten statt
            if (hasLicense) {
              setView('greyhound_app'); 
            } else {
              setShowLicenseError(true);
            }
          };

          // --- UI Components ---

          const DevBar = () => (
            <div className="bg-slate-800 text-white text-xs p-3 flex flex-wrap gap-4 justify-between items-center mb-6 rounded-md shadow-sm">
              <div className="flex items-center gap-6">
                <div className="flex flex-col gap-1">
                  <span className="text-[10px] text-slate-400 uppercase">Tarif (Schritt 2)</span>
                  <div className="flex gap-3">
                    <label className="flex items-center gap-1 cursor-pointer">
                      <input type="radio" checked={customerEdition === 'enterprise'} onChange={() => setCustomerEdition('enterprise')} className="accent-blue-500" />
                      Prof/Enterprise
                    </label>
                    <label className="flex items-center gap-1 cursor-pointer">
                      <input type="radio" checked={customerEdition === 'start'} onChange={() => setCustomerEdition('start')} className="accent-blue-500" />
                      Start/Advanced
                    </label>
                  </div>
                </div>

                <div className="w-px h-6 bg-slate-600"></div>

                <div className="flex flex-col gap-1">
                  <span className="text-[10px] text-slate-400 uppercase">Wawi verbunden? (Schritt 1)</span>
                  <label className="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" checked={isWawiConnected} onChange={(e) => setIsWawiConnected(e.target.checked)} className="accent-blue-500" />
                    Verbunden
                  </label>
                </div>

                <div className="w-px h-6 bg-slate-600"></div>

                <div className="flex flex-col gap-1">
                  <span className="text-[10px] text-slate-400 uppercase">Lizenz verfügbar? (Schritt 5)</span>
                  <label className="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" checked={hasLicense} onChange={(e) => setHasLicense(e.target.checked)} className="accent-blue-500" />
                    Ja, Lizenz vorhanden
                  </label>
                </div>
              </div>

              <button 
                onClick={() => { setView('overview_initial'); setShowLicenseError(false); }}
                className="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 transition-colors rounded font-medium"
              >
                Simulation zurücksetzen
              </button>
            </div>
          );

          const AppOverviewCard = ({ isActive }) => (
            <div className="bg-white border border-gray-200 rounded-lg shadow-sm">
              <div className="grid grid-cols-12 gap-4 px-6 py-3 border-b border-gray-200 text-sm font-medium text-gray-500">
                <div className="col-span-4">Aktive Apps</div>
                <div className="col-span-3">Entwickler</div>
                <div className="col-span-2">Status</div>
                <div className="col-span-3 text-right">Aktion</div>
              </div>

              <div className="grid grid-cols-12 gap-4 px-6 py-4 border-b border-gray-200 items-center">
                <div className="col-span-4 flex items-center gap-4">
                  <button className="text-gray-400 hover:text-gray-600">
                    <ChevronLeft className="w-5 h-5 -rotate-90" />
                  </button>
                  <div className="w-12 h-12 bg-black rounded-lg flex items-center justify-center text-white shadow-sm shrink-0">
                    <Archive className="w-7 h-7" />
                  </div>
                  <div className="min-w-0">
                    <h2 className="text-lg font-bold text-gray-900 truncate">JTL-Archive</h2>
                    <div className="flex items-center text-sm text-gray-500 gap-1 mt-0.5">
                      <ShoppingCart className="w-4 h-4 shrink-0" />
                      Gekauft
                    </div>
                  </div>
                </div>
                <div className="col-span-3 text-sm text-gray-700">
                  GREYHOUND Software<br/>GmbH
                </div>
                <div className="col-span-2">
                  {isActive ? (
                     <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-200">
                       <CheckCircle className="w-3.5 h-3.5" />
                       Installiert
                     </span>
                  ) : (
                    <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700 border border-gray-200">
                       Ausstehend
                     </span>
                  )}
                </div>
                <div className="col-span-3 flex justify-end items-center gap-3">
                  {isActive ? (
                    <button 
                      onClick={handleStartApp}
                      className="flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-900 hover:bg-gray-50 shadow-sm transition-all whitespace-nowrap"
                    >
                      <ExternalLink className="w-4 h-4 shrink-0" />
                      JTL-Archive starten
                    </button>
                  ) : (
                    <button className="p-2 text-gray-400 hover:text-gray-600 shrink-0">
                      <MoreHorizontal className="w-5 h-5" />
                    </button>
                  )}
                </div>
              </div>

              <div className="p-6 grid grid-cols-3 gap-8">
                <div className="col-span-2 space-y-4">
                  <div>
                    <h3 className="text-sm font-bold text-gray-900 mb-3">Beschreibung</h3>
                    <p className="text-sm text-gray-600 leading-relaxed mb-4">
                      Mittels der Aktivierung dieser App werden Belege aus der Wawi heraus über die Cloud revisionssicher in das JTL-Archive archiviert. Damit erfüllen Sie die gesetzlichen Vorgaben zur Aufbewahrung von steuerrelevanten Dokumenten unkompliziert und vollautomatisch.
                    </p>
                  </div>

                  {/* Prominenter Bereich für die Lizenzverwaltung */}
                  {isActive && (
                    <div className="p-5 bg-blue-50 border border-blue-100 rounded-lg flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mt-4">
                      <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center shrink-0 text-blue-600">
                          <CreditCard className="w-5 h-5" />
                        </div>
                        <div>
                          <h4 className="text-sm font-bold text-blue-900">Verwaltung</h4>
                          <p className="text-xs text-blue-800 mt-0.5">Lizenzen für das JTL-Archive steuern</p>
                        </div>
                      </div>
                      <button 
                        onClick={() => setView('license_management')}
                        className="w-full sm:w-auto px-5 py-2.5 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 shadow-sm transition-colors whitespace-nowrap"
                      >
                        Lizenzverwaltung
                      </button>
                    </div>
                  )}

                  <div className="pt-4">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-sm font-bold text-gray-900">Links & Informationen</h3>
                    </div>
                    <div className="space-y-4">
                      <div>
                        <div className="text-xs text-gray-500 mb-1">Website</div>
                        <a href="#" className="text-blue-600 hover:underline text-sm flex items-center gap-2">
                          <Globe className="w-4 h-4" /> https://v-198940156-3.greyhound.eu/unity
                        </a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              
              {!isActive && (
                <div className="border-t border-gray-200 p-4 bg-gray-50 flex justify-end rounded-b-lg">
                  <button 
                    onClick={handleStartWizard}
                    className="px-6 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 shadow-sm transition-colors"
                  >
                    Einrichtung starten
                  </button>
                </div>
              )}
            </div>
          );

          // --- WIZARD COMPONENT ---
          const Wizard = () => {
            const steps = [
              { id: 1, name: 'Verbindung prüfen' },
              { id: 2, name: 'Tarif & Bedingungen' },
              { id: 3, name: 'Einrichtung' }
            ];

            return (
              <div className="bg-white border border-gray-200 rounded-lg shadow-lg flex min-h-[550px] overflow-hidden">
                {/* Sidebar */}
                <div className="w-1/3 bg-gray-50 border-r border-gray-200 p-6 flex flex-col">
                  <div className="flex items-center gap-3 mb-10">
                    <div className="w-8 h-8 bg-black rounded flex items-center justify-center text-white">
                      <Archive className="w-5 h-5" />
                    </div>
                    <h2 className="font-bold text-gray-900 text-lg">JTL-Archive Setup</h2>
                  </div>

                  <div className="space-y-6">
                    {steps.map((step) => (
                      <div key={step.id} className="flex items-center gap-4">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-colors ${
                          wizardStep > step.id ? 'bg-green-500 text-white' : 
                          wizardStep === step.id ? 'bg-blue-600 text-white' : 
                          'bg-gray-200 text-gray-500'
                        }`}>
                          {wizardStep > step.id ? <Check className="w-4 h-4" /> : step.id}
                        </div>
                        <span className={`text-sm font-medium ${
                          wizardStep === step.id ? 'text-gray-900' : 'text-gray-500'
                        }`}>
                          {step.name}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Content Area */}
                <div className="w-2/3 p-8 flex flex-col relative">
                  <button 
                    onClick={() => setView('overview_initial')}
                    className="absolute top-6 right-6 text-gray-400 hover:text-gray-600"
                  >
                    Abbrechen
                  </button>

                  {/* STEP 1: Verbindung prüfen */}
                  {wizardStep === 1 && (
