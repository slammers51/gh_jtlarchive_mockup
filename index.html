<body class="bg-[#cbd5e1] overflow-hidden h-screen w-screen flex flex-col p-4">
    <div id="root" class="h-full w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- NATIVE LUCIDE ICONS ---
        const SVGIcon = ({ children, className = '' }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

        const AlertCircle = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></SVGIcon>;
        const AlertTriangle = (p) => <SVGIcon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></SVGIcon>;
        const Archive = (p) => <SVGIcon {...p}><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></SVGIcon>;
        const ArrowLeft = (p) => <SVGIcon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></SVGIcon>;
        const Bell = (p) => <SVGIcon {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></SVGIcon>;
        const Check = (p) => <SVGIcon {...p}><polyline points="20 6 9 17 4 12"/></SVGIcon>;
        const CheckCircle = (p) => <SVGIcon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></SVGIcon>;
        const ChevronDown = (p) => <SVGIcon {...p}><polyline points="6 9 12 15 18 9"/></SVGIcon>;
        const ChevronLeft = (p) => <SVGIcon {...p}><polyline points="15 18 9 12 15 6"/></SVGIcon>;
        const ChevronRight = (p) => <SVGIcon {...p}><polyline points="9 18 15 12 9 6"/></SVGIcon>;
        const CreditCard = (p) => <SVGIcon {...p}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></SVGIcon>;
        const Download = (p) => <SVGIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></SVGIcon>;
        const ExternalLink = (p) => <SVGIcon {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></SVGIcon>;
        const EyeOff = (p) => <SVGIcon {...p}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></SVGIcon>;
        const FileText = (p) => <SVGIcon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></SVGIcon>;
        const Filter = (p) => <SVGIcon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></SVGIcon>;
        const Folder = (p) => <SVGIcon {...p}><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-1.22-1.8A2 2 0 0 0 7.53 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></SVGIcon>;
        const Globe = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></SVGIcon>;
        const Grid = (p) => <SVGIcon {...p}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></SVGIcon>;
        const HelpCircle = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></SVGIcon>;
        const Home = (p) => <SVGIcon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></SVGIcon>;
        const Info = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></SVGIcon>;
        const List = (p) => <SVGIcon {...p}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></SVGIcon>;
        const Mail = (p) => <SVGIcon {...p}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></SVGIcon>;
        const MoreHorizontal = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></SVGIcon>;
        const RefreshCw = (p) => <SVGIcon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></SVGIcon>;
        const Search = (p) => <SVGIcon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></SVGIcon>;
        const Settings = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></SVGIcon>;
        const Shield = (p) => <SVGIcon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></SVGIcon>;
        const Trash2 = (p) => <SVGIcon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></SVGIcon>;
        const Users = (p) => <SVGIcon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></SVGIcon>;
        const X = (p) => <SVGIcon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></SVGIcon>;
        const LayoutGrid = Grid;

        const JTLLogo = ({ className = '' }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 49 36" className={className} fill="currentColor">
            <path d="M43.3931 0H4.94143C2.2103 0 0 2.2103 0 4.94143V31.0586C0 33.7897 2.2103 36 4.94143 36H43.3994C46.1306 36 48.3409 33.7897 48.3409 31.0586V4.94143C48.3345 2.2103 46.1242 0 43.3931 0ZM18.7304 26.1108C18.7304 28.5307 18.2223 30.055 17.2188 30.6584C16.5328 31.0713 14.8751 31.2745 12.2837 31.2745C10.1623 31.2745 8.77135 30.9442 8.15526 30.2964C7.53917 29.6422 7.22159 28.2385 7.22159 26.1108V20.5152H12.1757V25.7551C12.1757 26.8793 12.6203 27.1143 12.9951 27.1143C13.2999 27.1143 13.6747 26.9555 13.7509 26.1807V5.90049H18.7304V26.1108ZM30.036 9.91461H27.5462V31.1729H22.5603V9.91461H20.0706V5.90049H30.0423V9.91461H30.036ZM39.6965 31.1729H31.7255V5.90049H36.6733V27.0127H39.7029V31.1729H39.6965Z"></path>
          </svg>
        );

        // --- DRAGGABLE HELP WINDOW COMPONENT ---
        const DraggableHelpWindow = ({ isOpen, onClose }) => {
            const [pos, setPos] = useState({ x: window.innerWidth - 450, y: 80 });
            const [isDragging, setIsDragging] = useState(false);
            const [rel, setRel] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const onMouseMove = (e) => {
                    if (isDragging) {
                        setPos({ x: e.clientX - rel.x, y: e.clientY - rel.y });
                    }
                };
                const onMouseUp = () => setIsDragging(false);

                if (isDragging) {
                    window.addEventListener('mousemove', onMouseMove);
                    window.addEventListener('mouseup', onMouseUp);
                }
                return () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
            }, [isDragging, rel]);

            if (!isOpen) return null;

            return (
                <div 
                    className="fixed z-[9999] w-[400px] bg-indigo-900 border border-indigo-700 rounded-xl shadow-2xl flex flex-col text-white animate-fade-in-up"
                    style={{ left: `${pos.x}px`, top: `${pos.y}px` }}
                >
                    <div 
                        className="bg-indigo-950 p-3 rounded-t-xl border-b border-indigo-800 flex justify-between items-center cursor-move"
                        onMouseDown={(e) => {
                            setIsDragging(true);
                            setRel({ x: e.clientX - pos.x, y: e.clientY - pos.y });
                        }}
                    >
                        <div className="flex items-center gap-2 font-bold text-indigo-300 text-xs uppercase tracking-widest">
                            <Info className="w-4 h-4" /> Architektur-Notizen & Infos
                        </div>
                        <button onClick={onClose} className="text-indigo-400 hover:text-white"><X className="w-4 h-4"/></button>
                    </div>
                    <div className="p-5 max-h-[60vh] overflow-y-auto space-y-6 text-sm text-indigo-100 leading-relaxed">
                        
                        <div>
                            <strong className="block text-white mb-1">1. Kaufmännischer Prozess ausgegliedert</strong>
                            Gemäß Absprache (David S. & David H.) wurde die Lizenzbuchung aus dem Setup-Wizard entfernt, um die Abschlussquote nicht zu gefährden und rechtlichen Anforderungen zu genügen. Der Wizard wartet stattdessen auf die Buchung im JTL-Kundencenter (Bank-App-Style Polling).
                        </div>

                        <div>
                            <strong className="block text-white mb-1">2. Automatischer vs. Manueller Flow (Bestandskunden)</strong>
                            Da wir systemseitig (noch) nicht automatisch ermitteln können, ob ein JTL-User bereits GREYHOUND-Kunde ist, startet der Konfigurationsprozess zwingend mit der Weichen-Abfrage "Hast du bereits GREYHOUND im Einsatz?".
                        </div>

                        <div>
                            <strong className="block text-white mb-1">3. Serverbestätigung (Transparenz)</strong>
                            Die Serverauswahl wird Bestandskunden immer angezeigt, auch wenn nur ein System verknüpft ist. Dies dient der Transparenz, damit der Kunde exakt sieht, wo JTL-Archive aktiviert wird. Ein "neuer" Server kann hier nicht erstellt werden.
                        </div>

                        <div>
                            <strong className="block text-white mb-1">4. Wegfall der Wawi-Verbindungsprüfung</strong>
                            Da die Wawi zwingend mit der JTL-Cloud verbunden sein muss, wird dieser Zustand vorausgesetzt. Die eigenständige Verbindungsprüfung im Einrichtungsprozess (Wizard) entfällt komplett.
                        </div>

                        <div>
                            <strong className="block text-white mb-1">5. Implizite Benutzeranlage & SSO</strong>
                            Ziel ist ein echtes Single Sign-On: Klickt ein berechtigter User auf Starten, wird er automatisch als individueller GREYHOUND-Benutzer angemeldet. Der Account wird dabei implizit im Hintergrund angelegt.
                        </div>

                    </div>
                </div>
            );
        };

        function App() {
          // Views: 'apps_overview', 'install_scopes', 'install_progress', 'app_configuration', 'greyhound_app'
          const [view, setView] = useState('apps_overview');
          const [activeModal, setActiveModal] = useState('none');
          const [wizardStep, setWizardStep] = useState(1); 
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          
          // Dev-Toggles
          const [customerEdition, setCustomerEdition] = useState('enterprise'); 
          const [hasLicense, setHasLicense] = useState(false); 
          const [helpOpen, setHelpOpen] = useState(false);
          
          // State Variables
          const [isAppInstalled, setIsAppInstalled] = useState(false);
          const [isAppConfigured, setIsAppConfigured] = useState(false);
          const [isArchiveExpanded, setIsArchiveExpanded] = useState(false); 
          const [toast, setToast] = useState(null);
          
          // Install Progress State
          const [installProgressStep, setInstallProgressStep] = useState(0);

          // Wizard State
          const [isExistingCustomer, setIsExistingCustomer] = useState(false); // Default: Neukunde
          const [gccUser, setGccUser] = useState('admin@firma.de');
          const [gccPass, setGccPass] = useState('password123');
          const [selectedServer, setSelectedServer] = useState('new');
          const [provisioningStep, setProvisioningStep] = useState(0);
          const [licenseCheckStatus, setLicenseCheckStatus] = useState('checking');
          const [estimatedTime, setEstimatedTime] = useState(15);
          const [gracePeriodExpired, setGracePeriodExpired] = useState(false);

          // ADDED FOR PREVIEW SCALING
          const previewContainerRef = useRef(null);
          const [previewScale, setPreviewScale] = useState(1);

          // Helpers
          const showToast = (title, message) => {
            setToast({ title, message });
            setTimeout(() => setToast(null), 4000);
          };

          const resetSimulation = () => {
            setView('apps_overview');
            setActiveModal('none');
            setIsAppInstalled(false);
            setIsAppConfigured(false);
            setIsArchiveExpanded(false);
            setWizardStep(1);
            setIsExistingCustomer(false);
            setSelectedServer('new');
            setProvisioningStep(0);
            setLicenseCheckStatus('checking');
            setEstimatedTime(15);
            setGracePeriodExpired(false);
            setInstallProgressStep(0);
            setGccUser('admin@firma.de');
            setGccPass('password123');
            setHasLicense(false);
            setIsMenuOpen(false);
            setToast(null);
          };

          // Native JTL Installation Simulation
          useEffect(() => {
            if (view === 'install_progress') {
                const timers = [
                    setTimeout(() => setInstallProgressStep(1), 1000),
                    setTimeout(() => setInstallProgressStep(2), 2000),
                    setTimeout(() => setInstallProgressStep(3), 3000),
                    setTimeout(() => setInstallProgressStep(4), 4000),
                    setTimeout(() => { setInstallProgressStep(5); setIsAppInstalled(true); }, 5000),
                ];
                return () => timers.forEach(clearTimeout);
            }
          }, [view]);

          // Greyhound App Configuration Simulation (System Provisioning Polling)
          useEffect(() => {
              if (view === 'app_configuration' && wizardStep === 4) {
                  if (isExistingCustomer) {
                      // Bestandskunden-Flow: Checklist (schneller)
                      const timers = [
                          setTimeout(() => setProvisioningStep(1), 1500),
                          setTimeout(() => setProvisioningStep(2), 3000),
                          setTimeout(() => setProvisioningStep(3), 4500),
                          setTimeout(() => setProvisioningStep(4), 6500)
                      ];
                      return () => timers.forEach(clearTimeout);
                  } else {
                      // Neukunden-Flow: Timer & Polling
                      setEstimatedTime(15);
                      const provisionTimer = setTimeout(() => {
                          setProvisioningStep(4);
                      }, 15000); 
                      return () => clearTimeout(provisionTimer);
                  }
              }
          }, [view, wizardStep, isExistingCustomer]);

          // Countdown Timer für die Wartezeit (NUR Neukunden)
          useEffect(() => {
              let interval;
              if (view === 'app_configuration' && wizardStep === 4 && provisioningStep < 4 && !isExistingCustomer) {
                  interval = setInterval(() => {
                      setEstimatedTime(prev => (prev > 0 ? prev - 1 : 0));
                  }, 1000);
              }
              return () => clearInterval(interval);
          }, [view, wizardStep, provisioningStep, isExistingCustomer]);

          // Document Preview Scaling (Rechnung dynamisch einpassen)
          useEffect(() => {
              if (view === 'greyhound_app' && previewContainerRef.current) {
                  const observer = new ResizeObserver((entries) => {
                      for (let entry of entries) {
                          const { width, height } = entry.contentRect;
                          // Ziehe 64px für einen sauberen Puffer/Rand ringsherum ab
                          const scaleX = (width - 64) / 700;
                          const scaleY = (height - 64) / 990;
                          // Verwende den kleinsten Faktor, deckel den Maximalwert aber bei 1 (100%)
                          setPreviewScale(Math.min(scaleX, scaleY, 1));
                      }
                  });
                  observer.observe(previewContainerRef.current);
                  return () => observer.disconnect();
              }
          }, [view]);

          // Simulation der Lizenzprüfung während der Bereitstellung (NUR Neukunden)
          useEffect(() => {
              if (view === 'app_configuration' && wizardStep === 4 && provisioningStep < 4 && !isExistingCustomer) {
                  setLicenseCheckStatus('checking');
                  // Simuliert die 5-sekündige Lizenzprüfung im Hintergrund (ohne sichtbare UI)
                  const licenseTimer = setTimeout(() => {
                      setLicenseCheckStatus(hasLicense ? 'found' : 'not_found');
                  }, 5000);
                  return () => clearTimeout(licenseTimer);
              }
          }, [view, wizardStep, hasLicense, provisioningStep, isExistingCustomer]);

          const handleFinishConfiguration = () => {
              setIsAppConfigured(true);
              setIsArchiveExpanded(false); // Akkordeon geschlossen nach Installation
              setView('apps_overview');
              showToast('Konfiguration abgeschlossen', 'Das JTL-Archive ist nun einsatzbereit.');
          };

          const formatTime = (seconds) => {
              const m = Math.floor(seconds / 60).toString().padStart(2, '0');
              const s = (seconds % 60).toString().padStart(2, '0');
              return `${m}:${s}`;
          };

          const handleStartApp = () => {
            setView('greyhound_app'); 
            // Blockiere den iFrame-Zugriff, wenn keine Lizenz da ist UND (Bestandskunde ODER Kulanz abgelaufen)
            if (!hasLicense && (isExistingCustomer || gracePeriodExpired)) {
              setActiveModal('license_error');
            }
          };

          // --- TOP DEV BAR ---
          const renderDevBar = () => (
            <div className="bg-slate-800 rounded-xl shadow-md text-white text-xs p-4 flex flex-col gap-4 z-[100] relative mb-4 shrink-0 border border-slate-700 mx-4 mt-4">
              <div className="flex justify-between items-center w-full">
                  <div className="flex items-center gap-6">
                    <div className="flex flex-col gap-1.5">
                      <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Lizenz verfügbar?</span>
                      <label className="flex items-center gap-1.5 cursor-pointer bg-slate-900 p-1.5 rounded-lg hover:text-blue-300 transition-colors">
                        <input type="checkbox" checked={hasLicense} onChange={(e) => setHasLicense(e.target.checked)} className="accent-blue-500 w-3.5 h-3.5" />
                        Ja, im KC gebucht
                      </label>
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Kulanz abgelaufen?</span>
                      <label className={`flex items-center gap-1.5 p-1.5 rounded-lg transition-colors ${hasLicense || isExistingCustomer ? 'opacity-50 cursor-not-allowed bg-slate-800' : 'bg-slate-900 cursor-pointer hover:text-blue-300'}`}>
                        <input type="checkbox" checked={gracePeriodExpired} onChange={(e) => setGracePeriodExpired(e.target.checked)} disabled={hasLicense || isExistingCustomer} className="accent-blue-500 w-3.5 h-3.5" />
                        Ja (Sperrt Neukunden)
                      </label>
                    </div>

                        </div>

                        <div className="w-5 h-5 rounded-full flex items-center justify-center shrink-0 mt-0.5">

                        </button>

            </div>
